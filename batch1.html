<!DOCTYPE html>
<html>
<head>
    <title>Website</title>
    <link rel="stylesheet" href="batch1.css">
</head>

<body>

    <p id="p1" class="pclass">Paragraph-1</p>
    <p id="p2">Paragraph-2</p>

    <h1 class="pclass">H1</h1>
    <h2>H2</h2>
    <h3>H3</h3>
    <h4>H4</h4>
    <h5>H5</h5>
    <h6>H6</h6>

    <div>
        <img src="rotary.png" alt="Rotary Logo">
    </div>

    <div>
        <video controls>
            <source src="vid.mp4" type="video/mp4">
            Your browser does not support video.
        </video>
    </div>

    <ol>
        <li>2nd point</li>
    </ol>

    <ul>
        <li>1st point</li>
        <li>2nd point</li>
    </ul>

    <table border="1">
        <tr>
            <th>1</th>
            <th>2</th>
        </tr>
        <tr>
            <td>3</td>
            <td>4</td>
        </tr>
    </table>

    <a href="https://www.google.com">Google</a>

    <form>

        <label>Name:</label>
        <input type="text"><br><br>

        <label>Email:</label>
        <input type="email"><br><br>

        Gender:
        <input type="radio" name="gender" value="Male">Male
        <input type="radio" name="gender" value="Female">Female
        <br><br>

        Hobbies:
        <input type="checkbox" value="Basketball">Basketball
        <input type="checkbox" value="Singing">Singing
        <br><br>

        Events:
        <select>
            <option>Festival</option>
            <option>Birthday</option>
            <option>Other</option>
        </select>
        <br><br>

        <button type="submit">Submit</button>

    </form>
    <nav>
        <a href="">Home</a>
        <a href="">Contact</a>
    </nav>
    <div class="grid">
        <div id="x">1</div>
        <div id="y">2</div>
        <div id="z">3</div>
        <div id="a">4</div>
        <div id="b">5</div>
        <div id="c">6</div>
    </div>
</body>
</html>
